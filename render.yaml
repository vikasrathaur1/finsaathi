services:
  - type: web
    name: finsaathi-portal-backend
    rootDir: portal/backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: REGISTRY_PATH
        value: ./registry
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MCP_SERVER_URL
        sync: false

  - type: web
    name: finsaathi-mcp-server
    rootDir: mcp-server
    runtime: node
    buildCommand: npm install
    startCommand: node src/server.js
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ID
        value: bajaj-finance
      - key: PORTAL_API_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SANDBOX_OTP
        value: "123456"
      - key: SESSION_TTL_MINUTES
        value: "30"
