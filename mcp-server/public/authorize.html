<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinSaathi — Secure Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      color: #e2e8f0;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: #6366f1;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: white;
    }
    .logo-name { font-weight: 600; font-size: 16px; color: white; }
    .logo-sub  { font-size: 11px; color: #64748b; margin-top: 1px; }
    h1 { font-size: 20px; font-weight: 600; color: white; margin-bottom: 6px; }
    p.sub { font-size: 13px; color: #64748b; margin-bottom: 24px; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #475569; }
    button {
      width: 100%;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover   { background: #5254cc; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error  { font-size: 13px; color: #f87171; margin-bottom: 12px; display: none; }
    .success { font-size: 13px; color: #4ade80; margin-bottom: 12px; display: none; }
    #otp-section { display: none; }
    .sandbox-note {
      margin-top: 20px;
      background: #6366f1/10;
      border: 1px solid #6366f1/30;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #818cf8;
    }
    .divider { height: 1px; background: #2d3148; margin: 20px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">FS</div>
      <div>
        <div class="logo-name">FinSaathi</div>
        <div class="logo-sub" id="client-name">Secure Login</div>
      </div>
    </div>

    <h1>Verify your identity</h1>
    <p class="sub">Enter your registered mobile number to access your account.</p>

    <div id="error"   class="error"></div>
    <div id="success" class="success"></div>

    <!-- Step 1: Mobile -->
    <div id="mobile-section">
      <label>Mobile Number</label>
      <input id="mobile" type="tel" placeholder="9999999999" maxlength="10" />
      <button id="send-btn" onclick="sendOtp()">Send OTP →</button>
    </div>

    <!-- Step 2: OTP -->
    <div id="otp-section">
      <div class="divider"></div>
      <label>Enter OTP sent to <span id="masked-mobile"></span></label>
      <input id="otp" type="text" placeholder="6-digit OTP" maxlength="6" />
      <button id="verify-btn" onclick="verifyOtp()">Verify & Login →</button>
      <p style="font-size:12px;color:#64748b;margin-top:10px;cursor:pointer" onclick="reset()">← Change number</p>
    </div>

    <div class="sandbox-note" id="sandbox-note" style="display:none">
      🧪 Sandbox mode · Use OTP: <strong id="sandbox-otp"></strong>
    </div>
  </div>

  <script>
    const params              = new URLSearchParams(window.location.search);
    const clientId            = params.get("client_id") || "";
    const redirectUri         = params.get("redirect_uri") || "";
    const state               = params.get("state") || "";
    const codeChallenge       = params.get("code_challenge") || "";
    const codeChallengeMethod = params.get("code_challenge_method") || "S256";

    // Show client name if passed
    const clientNameEl = document.getElementById("client-name");
    if (clientId) clientNameEl.textContent = clientId;

    function showError(msg)   { const el = document.getElementById("error");   el.textContent = msg; el.style.display = "block"; document.getElementById("success").style.display = "none"; }
    function showSuccess(msg) { const el = document.getElementById("success"); el.textContent = msg; el.style.display = "block"; document.getElementById("error").style.display = "none"; }
    function clearMessages()  { document.getElementById("error").style.display = "none"; document.getElementById("success").style.display = "none"; }

    async function sendOtp() {
      clearMessages();
      const mobile = document.getElementById("mobile").value.trim();
      if (!/^\d{10}$/.test(mobile)) { showError("Enter a valid 10-digit mobile number."); return; }

      const btn = document.getElementById("send-btn");
      btn.disabled = true; btn.textContent = "Sending…";

      try {
        const res  = await fetch("/auth/send-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mobile }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to send OTP");

        showSuccess("OTP sent successfully!");
        document.getElementById("mobile-section").style.display = "none";
        document.getElementById("otp-section").style.display = "block";
        document.getElementById("masked-mobile").textContent = mobile.replace(/(\d{6})(\d{4})/, "XXXXXX$2");

        if (data.sandbox) {
          document.getElementById("sandbox-note").style.display = "block";
          document.getElementById("sandbox-otp").textContent = data.sandboxOtp || "123456";
        }
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false; btn.textContent = "Send OTP →";
      }
    }

    async function verifyOtp() {
      clearMessages();
      const mobile = document.getElementById("mobile").value.trim();
      const otp    = document.getElementById("otp").value.trim();
      if (!otp || otp.length !== 6) { showError("Enter the 6-digit OTP."); return; }

      const btn = document.getElementById("verify-btn");
      btn.disabled = true; btn.textContent = "Verifying…";

      try {
        const res  = await fetch("/auth/verify-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mobile, otp, code_challenge: codeChallenge, code_challenge_method: codeChallengeMethod }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Verification failed");

        showSuccess("Verified! Redirecting…");

        // Hand code back to Claude via OAuth redirect
        if (redirectUri) {
          const url = new URL(redirectUri);
          url.searchParams.set("code",  data.code);
          url.searchParams.set("state", state);
          setTimeout(() => window.location.href = url.toString(), 800);
        }
      } catch (err) {
        showError(err.message);
        btn.disabled = false; btn.textContent = "Verify & Login →";
      }
    }

    function reset() {
      document.getElementById("mobile-section").style.display = "block";
      document.getElementById("otp-section").style.display = "none";
      document.getElementById("sandbox-note").style.display = "none";
      clearMessages();
      document.getElementById("otp").value = "";
    }

    // Allow Enter key
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      if (document.getElementById("otp-section").style.display !== "none") verifyOtp();
      else sendOtp();
    });
  </script>
</body>
</html>
